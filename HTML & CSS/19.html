<!doctype html>
<html lang="en">
  <head>
    <title>Question 19 - Registration & Login</title>
    <link rel="stylesheet" href="19.css" />
  </head>
  <body>
    <div class="main-container">
      <h1>REGISTRATION / LOGIN FORM</h1>

      <div class="forms-wrapper">
        <div class="form-box">
          <h2 class="reg-title">Register Form :</h2>
          <form>
            <input type="text" placeholder="Username" />
            <input type="email" placeholder="Email" />
            <p class="hint">Please enter a valid email address</p>
            <input type="password" placeholder="Password" />
            <p class="hint">Minimum of 6 characters</p>
            <input type="password" placeholder="Confirm password" />

            <div class="radio-group">
              <input type="radio" name="g" /> Female
              <input type="radio" name="g" /> Male
            </div>

            <label class="check-label">
              <input type="checkbox" /> I have read and accept terms of use
            </label>
            <button type="submit" class="submit-btn">SUBMIT</button>
          </form>
        </div>

        <div class="form-box">
          <h2 class="login-title">Login form :</h2>
          <form>
            <input type="email" placeholder="Enter Your Email" />
            <input type="password" placeholder="Password" />
            <label class="check-label">
              <input type="checkbox" /> Remember me
            </label>
            <button type="submit" class="submit-btn login-btn">LOGIN</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
