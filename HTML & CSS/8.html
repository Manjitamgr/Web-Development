<!doctype html>
<html>
  <head>
    <title>Image Map Lab Task</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        text-align: center;
        background: #fdfbfb;
        padding: 20px;
      }
      .map-container {
        display: inline-block;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border: 4px solid #fff;
      }
      h2 {
        color: #ff8fa3;
      }
      p {
        color: #666;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h2>Image Map</h2>

    <div class="map-container">
      <img
        src="../image.src/imagemap.jpg"
        usemap="#workmap"
        width="600"
        height="400"
        alt="Shapes"
      />
    </div>

    <map name="workmap">
      <area
        shape="rect"
        coords="60,60,180,180"
        alt="Cube"
        href="https://www.google.com"
        title="This is the Cube"
      />

      <area
        shape="circle"
        coords="515,100,50"
        alt="Sphere"
        href="https://www.wikipedia.org"
        title="This is the Sphere"
      />

      <area
        shape="poly"
        coords="425,350,515,350,470,250"
        alt="Cone"
        href="https://www.github.com"
        title="This is the pyramid"
      />
    </map>
  </body>
</html>
