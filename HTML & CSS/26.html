<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Gallery - Question 26</title>
    <link rel="stylesheet" href="26.css">
</head>
<body>

    <h1 class="gallery-title">Flower Gallery</h1>

    <div class="gallery-container">
        <figure class="gallery-item">
            <img src="../image.src/rose.jpg" alt="Rose">
            <figcaption>
                <h3>Rose</h3>
                <p>Beautiful Rose</p>
            </figcaption>
        </figure>

        <figure class="gallery-item">
            <img src="../image.src/tulip.jpg" alt="Tulip">
            <figcaption>
                <h3>Tulip</h3>
                <p>Simple Tulip</p>
            </figcaption>
        </figure>

        <figure class="gallery-item">
            <img src="../image.src/lily.jpg" alt="Lily">
            <figcaption>
                <h3>Lily</h3>
                <p>White Lily</p>
            </figcaption>
        </figure>

        <figure class="gallery-item">
            <img src="../image.src/daisy.jpg" alt="Daisy">
            <figcaption>
                <h3>Daisy</h3>
                <p>Fresh Daisy</p>
            </figcaption>
        </figure>
        
        <figure class="gallery-item">
            <img src="../image.src/sunflower.jpg" alt="Sunflower">
            <figcaption>
                <h3>Sunflower</h3>
                <p>Yellow Sunflower</p>
            </figcaption>
        </figure>
        
        <figure class="gallery-item">
            <img src="../image.src/orchid.jpg" alt="Orchid">
            <figcaption>
                <h3>Orchid</h3>
                <p>Purple Orchid</p>
            </figcaption>
        </figure>
        
        <figure class="gallery-item">
            <img src="../image.src/lavender.jpg" alt="Lavender">
            <figcaption>
                <h3>Lavender</h3>
                <p>Sweet Lavender</p>
            </figcaption>
        </figure>
        
        <figure class="gallery-item">
            <img src="../image.src/peony.jpg" alt="Peony">
            <figcaption>
                <h3>Peony</h3>
                <p>Pink Peony</p>
            </figcaption>
        </figure>

    </div>

</body>
</html>
